<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Register - Traffic Complaint System</title>
    <link rel="stylesheet" href="static/auth.css">
</head>
<body>

<div class="card">
    <h2>Create Account</h2>
    <p>Register to report traffic complaints</p>

    <form onsubmit="return registerUser()">
        <input type="text" placeholder="Full Name" required>
        <input type="email" placeholder="Email Address" required>
        <input type="password" placeholder="Password" required>
        <button type="submit">Register</button>
    </form>

    <p style="margin-top:15px;">
        Already have an account?
        <a href="login.html">Login here</a>
    </p>
</div>

<script>
function registerUser() {
    alert("Registration Successful!");
    window.location.href = "login.html";
    return false;
}
</script>

</body>
</html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Traffic Complaint System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container-centered">
    <section class="auth-card">
        <h2>Create Your Account</h2>
        <p>Register now and start reporting traffic violations online.</p>

        <form method="POST" action="/register">
            <div class="form-group">
                <label for="email">Email address</label>
                <input id="email" name="email" type="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" placeholder="Choose a secure password" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn">Create Account</button>
            </div>
        </form>

        <p class="small-text">Already registered? <a href="/login">Login here</a></p>
    </section>
</div>
</body>
</html>
